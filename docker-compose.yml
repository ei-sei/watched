version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: brsti-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brsti_db}
      POSTGRES_USER: ${POSTGRES_USER:-brsti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brsti} -d ${POSTGRES_DB:-brsti_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - brsti_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brsti-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-brsti}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-brsti_db}?sslmode=disable
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ENVIRONMENT: development
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brsti_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: brsti-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    networks:
      - brsti_net

volumes:
  pg_data:
    driver: local

networks:
  brsti_net:
    driver: bridge
